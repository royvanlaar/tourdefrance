
<style>
  :root {
    --tdf-yellow: #F5C518;
    --tdf-yellow-dim: rgba(245,197,24,0.12);
    --tdf-bg: #0f1117;
    --tdf-surface: #181c26;
    --tdf-surface2: #1f2433;
    --tdf-border: rgba(255,255,255,0.08);
    --tdf-text: #f0f0f0;
    --tdf-muted: #8a8f9e;
    --tdf-red: #e05252;
    --tdf-green: #4caf7d;
    --tdf-blue: #5b9cf6;
    --tdf-orange: #f0924a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  .tdf-wrap {
    display: flex;
    height: 100vh;
    background: var(--tdf-bg);
    border-radius: 12px;
    overflow: hidden;
    font-family: sans-serif;
    color: var(--tdf-text);
  }

  /* SIDEBAR */
  .tdf-sidebar {
    width: 200px;
    min-width: 200px;
    background: var(--tdf-surface);
    border-right: 1px solid var(--tdf-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .tdf-brand {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--tdf-border);
  }
  .tdf-brand-name {
    font-size: 18px;
    font-weight: 500;
    color: var(--tdf-yellow);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tdf-brand-sub {
    font-size: 12px;
    color: var(--tdf-muted);
    margin-top: 2px;
  }
  .tdf-countdown {
    background: var(--tdf-yellow-dim);
    border: 1px solid rgba(245,197,24,0.25);
    border-radius: 6px;
    padding: 5px 8px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--tdf-yellow);
    font-weight: 500;
  }
  .tdf-tabs {
    display: flex;
    border-bottom: 1px solid var(--tdf-border);
  }
  .tdf-tab {
    flex: 1;
    padding: 8px 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--tdf-muted);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s;
  }
  .tdf-tab.active {
    color: var(--tdf-yellow);
    border-bottom-color: var(--tdf-yellow);
  }
  .tdf-stage-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--tdf-border) transparent;
  }
  .tdf-stage-item {
    padding: 9px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--tdf-border);
    transition: background 0.1s;
    position: relative;
  }
  .tdf-stage-item:hover { background: var(--tdf-surface2); }
  .tdf-stage-item.active {
    background: var(--tdf-yellow-dim);
    border-left: 2px solid var(--tdf-yellow);
    padding-left: 12px;
  }
  .tdf-stage-item.wow:not(.active)::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--tdf-orange);
  }
  .tdf-stage-num {
    font-size: 11px;
    color: var(--tdf-muted);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .tdf-stage-dest {
    font-size: 14px;
    color: var(--tdf-text);
    font-weight: 500;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tdf-stage-item.rest .tdf-stage-dest { color: var(--tdf-muted); }
  .tdf-stage-meta {
    font-size: 11px;
    color: var(--tdf-muted);
    margin-top: 2px;
  }
  .tdf-pill {
    display: inline-block;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 20px;
    font-weight: 500;
    margin-top: 3px;
  }
  .pill-mountain { background: rgba(224,82,82,0.18); color: #e05252; }
  .pill-sprint { background: rgba(76,175,125,0.18); color: #4caf7d; }
  .pill-hilly { background: rgba(240,146,74,0.18); color: #f0924a; }
  .pill-tt { background: rgba(91,156,246,0.18); color: #5b9cf6; }
  .pill-wow { background: rgba(245,197,24,0.18); color: var(--tdf-yellow); margin-left: 3px; }
  .pill-rest { background: rgba(138,143,158,0.15); color: var(--tdf-muted); }

  /* MAIN */
  .tdf-main {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--tdf-border) transparent;
  }

  /* STAGE HERO */
  .tdf-hero {
    background: var(--tdf-surface);
    border-bottom: 1px solid var(--tdf-border);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tdf-hero-eyebrow {
    font-size: 11px;
    font-weight: 500;
    color: var(--tdf-yellow);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .tdf-hero-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--tdf-text);
    line-height: 1.2;
  }
  .tdf-hero-route {
    font-size: 12px;
    color: var(--tdf-muted);
    margin-top: 4px;
  }
  .tdf-hero-tv {
    font-size: 12px;
    color: var(--tdf-muted);
    margin-top: 4px;
  }
  .tdf-hero-stats {
    display: flex;
    gap: 20px;
    margin-top: 12px;
  }
  .tdf-hero-stat {
    display: flex;
    flex-direction: column;
  }
  .tdf-hero-stat-val {
    font-size: 18px;
    font-weight: 500;
    color: var(--tdf-text);
  }
  .tdf-hero-stat-label {
    font-size: 12px;
    color: var(--tdf-muted);
    margin-top: 1px;
    letter-spacing: 0.3px;
  }
  .tdf-hero-jerseys {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .jersey {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
    border: 1px solid;
  }
  .jersey-yellow { background: rgba(245,197,24,0.1); border-color: rgba(245,197,24,0.3); color: var(--tdf-yellow); }
  .jersey-green { background: rgba(76,175,125,0.1); border-color: rgba(76,175,125,0.3); color: #4caf7d; }
  .jersey-dot { background: rgba(224,82,82,0.1); border-color: rgba(224,82,82,0.3); color: #e05252; }
  .jersey-white { background: rgba(200,210,240,0.1); border-color: rgba(200,210,240,0.3); color: #c8d2f0; }

  /* CONTENT */
  .tdf-content { padding: 20px 24px; }
  .tdf-section { margin-bottom: 24px; }
  .tdf-section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--tdf-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--tdf-border);
  }

  /* PROFILE */
  .tdf-profile {
    height: 56px;
    background: var(--tdf-surface2);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    padding: 4px 6px 0;
    gap: 2px;
    margin-bottom: 16px;
  }
  .tdf-profile-seg {
    border-radius: 3px 3px 0 0;
    flex: 1;
  }

  /* WOW BANNER */
  .tdf-wow {
    background: rgba(245,197,24,0.08);
    border: 1px solid rgba(245,197,24,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--tdf-yellow);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tdf-wow-icon { font-size: 14px; }

  /* CARDS */
  .tdf-card {
    background: var(--tdf-surface2);
    border: 1px solid var(--tdf-border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .tdf-analysis {
    font-size: 14px;
    color: rgba(240,240,240,0.8);
    line-height: 1.7;
  }

  /* FAVS */
  .tdf-fav {
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--tdf-surface2);
    border: 1px solid var(--tdf-border);
    border-radius: 8px;
    margin-bottom: 6px;
    transition: border-color 0.15s;
  }

  .tdf-fav div {
    margin: 12px 0;
  }

  .tdf-fav:hover { border-color: rgba(245,197,24,0.3); }
  .tdf-fav-rank {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--tdf-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--tdf-muted);
    flex-shrink: 0;
  }
  .tdf-fav-rank.r1 { background: rgba(245,197,24,0.2); color: var(--tdf-yellow); }
  .tdf-fav-rank.r2 { background: rgba(200,210,240,0.15); color: #c8d2f0; }
  .tdf-fav-name { font-size: 14px; font-weight: 500; color: var(--tdf-text); flex: 1; }
  .tdf-fav-team { font-size: 12px; color: var(--tdf-muted); }
  .tdf-fav-note { font-size: 14px; color: var(--tdf-muted); text-align: left; max-width: 280px; line-height: 1.4; }

  /* GC TABLE */
  .tdf-gc-table { width: 100%; border-collapse: collapse; }
  .tdf-gc-table thead th {
    font-size: 14px;
    color: var(--tdf-muted);
    font-weight: 500;
    text-align: left;
    padding: 0 8px 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tdf-gc-table tbody tr {
    border-top: 1px solid var(--tdf-border);
    transition: background 0.1s;
  }
  .tdf-gc-table tbody tr:hover { background: var(--tdf-surface2); }
  .tdf-gc-table td {
    padding: 9px 8px;
    font-size: 14px;
    color: var(--tdf-text);
  }
  .tdf-gc-pos { color: var(--tdf-muted); font-size: 12px; width: 24px; }
  .tdf-gc-time { color: var(--tdf-yellow); font-weight: 500; text-align: right; }

  /* H2H */
  .tdf-h2h-grid {
    display: grid;
    grid-template-columns: 1fr 32px 1fr;
    gap: 8px;
    align-items: start;
    margin-bottom: 10px;
  }
  .tdf-h2h-card {
    background: var(--tdf-surface2);
    border: 1px solid var(--tdf-border);
    border-radius: 10px;
    padding: 14px;
  }
  .tdf-h2h-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--tdf-text);
    margin-bottom: 6px;
  }
  .tdf-h2h-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .badge-favor { background: rgba(76,175,125,0.15); color: #4caf7d; border: 1px solid rgba(76,175,125,0.3); }
  .badge-neut { background: rgba(138,143,158,0.15); color: var(--tdf-muted); border: 1px solid var(--tdf-border); }
  .badge-against { background: rgba(224,82,82,0.15); color: #e05252; border: 1px solid rgba(224,82,82,0.3); }
  .tdf-h2h-body { font-size: 14px; color: rgba(240,240,240,0.65); line-height: 1.6; }
  .tdf-h2h-vs {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--tdf-muted);
    padding-top: 16px;
  }
  .tdf-prediction {
    background: rgba(245,197,24,0.06);
    border: 1px solid rgba(245,197,24,0.15);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: rgba(240,240,240,0.8);
    line-height: 1.6;
  }
  .tdf-prediction-label {
    font-size: 11px;
    color: var(--tdf-yellow);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  /* DUTCH */
  .tdf-dutch {
    background: var(--tdf-surface2);
    border: 1px solid rgba(91,156,246,0.25);
    border-radius: 10px;
    overflow: hidden;
  }
  .tdf-dutch-rider {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 14px;
    border-bottom: 1px solid var(--tdf-border);
    gap: 12px;
  }
  .tdf-dutch-rider:last-child { border-bottom: none; }
  .tdf-dutch-name { font-size: 14px; font-weight: 500; color: var(--tdf-text); }
  .tdf-dutch-team { font-size: 12px; color: var(--tdf-muted); margin-top: 2px; }
  .tdf-dutch-outlook { font-size: 14px; color: var(--tdf-muted); text-align: right; max-width: 180px; line-height: 1.5; }

  /* COLS */
  .tdf-col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tdf-col-card {
    background: var(--tdf-surface2);
    border: 1px solid var(--tdf-border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .tdf-col-card:hover {
    border-color: rgba(224,82,82,0.4);
    background: rgba(224,82,82,0.04);
  }
  .tdf-col-name { font-size: 14px; font-weight: 500; color: var(--tdf-text); }
  .tdf-col-stats { font-size: 14px; color: var(--tdf-muted); margin-top: 4px; line-height: 1.5; }
  .tdf-col-cat {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 20px;
    margin-top: 5px;
    background: rgba(224,82,82,0.12);
    color: #e05252;
    border: 1px solid rgba(224,82,82,0.25);
  }
  .tdf-col-hint { font-size: 11px; color: rgba(91,156,246,0.8); margin-top: 5px; }

  /* REST DAY */
  .tdf-rest {
    padding: 48px 24px;
    text-align: center;
  }
  .tdf-rest-icon {
    font-size: 40px;
    margin-bottom: 16px;
  }
  .tdf-rest-title {
    font-size: 22px;
    font-weight: 500;
    color: var(--tdf-text);
    margin-bottom: 8px;
  }
  .tdf-rest-body {
    font-size: 14px;
    color: var(--tdf-muted);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 28px;
  }

  /* MODAL */
  .tdf-modal-bg {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    border-radius: 12px;
  }
  .tdf-modal {
    background: var(--tdf-surface2);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 22px 24px;
    max-width: 380px;
    width: 90%;
    position: relative;
  }
  .tdf-modal-close {
    position: absolute;
    top: 12px; right: 14px;
    background: none;
    border: none;
    color: var(--tdf-muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .tdf-modal-title { font-size: 18px; font-weight: 500; color: var(--tdf-text); margin-bottom: 3px; }
  .tdf-modal-cat { font-size: 11px; color: #e05252; margin-bottom: 14px; font-weight: 500; }
  .tdf-modal-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--tdf-border);
    font-size: 14px;
  }
  .tdf-modal-row:last-of-type { border-bottom: none; }
  .tdf-modal-key { color: var(--tdf-muted); }
  .tdf-modal-val { color: var(--tdf-text); font-weight: 500; }
  .tdf-modal-hist { font-size: 13px; color: var(--tdf-muted); line-height: 1.6; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--tdf-border); }

  /* RIDERS VIEW */
  .tdf-rider-hero {
    background: var(--tdf-surface2);
    border: 1px solid var(--tdf-border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .tdf-rider-headline {
    font-size: 18px;
    font-weight: 500;
    color: var(--tdf-text);
    margin-bottom: 2px;
  }
  .tdf-rider-subtitle { font-size: 12px; color: var(--tdf-muted); margin-bottom: 12px; }
  .tdf-rider-style { font-size: 14px; color: var(--tdf-yellow); font-style: italic; margin-bottom: 12px; line-height: 1.5; }
  .tdf-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .tdf-attr-label { font-size: 11px; color: var(--tdf-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  .tdf-attr-item { font-size: 14px; color: rgba(240,240,240,0.75); margin-bottom: 3px; padding-left: 8px; position: relative; line-height: 1.5; }
  .tdf-attr-item::before { content: '+'; position: absolute; left: 0; color: var(--tdf-green); }
  .tdf-attr-item.minus::before { content: '−'; color: var(--tdf-red); }
  .tdf-verdict {
    background: var(--tdf-yellow-dim);
    border: 1px solid rgba(245,197,24,0.2);
    border-radius: 10px;
    padding: 16px 18px;
    margin-top: 12px;
  }
  .tdf-verdict-label { font-size: 11px; color: var(--tdf-yellow); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
  .tdf-verdict-body { font-size: 14px; color: rgba(240,240,240,0.8); line-height: 1.7; }

  /* ===== RESPONSIVE / MOBIEL ===== */
  @media (max-width: 920px){
    .tdf-wrap{
      flex-direction: column;
      height: 100%;
      min-height: 100vh;
      border-radius: 0;
    }
    .tdf-sidebar{
      width: 100%;
      min-width: 0;
      max-height: 46vh;
      border-right: none;
      border-bottom: 1px solid var(--tdf-border);
    }
    .tdf-brand{ padding: 12px 14px 10px; }
    .tdf-brand-name{ font-size: 16px; }
    .tdf-stage-item{ padding: 10px 14px; }
    .tdf-main{ max-height: none; }
    .tdf-hero{ padding: 14px 16px 12px; }
    .tdf-hero-title{ font-size: 17px; }
    .tdf-hero-stats{ flex-wrap: wrap; gap: 12px 20px; }
    .tdf-content{ padding: 14px 16px; }
    .tdf-col-grid{ grid-template-columns: 1fr; }
    .tdf-two-col{ grid-template-columns: 1fr; }
    .tdf-h2h-grid{
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .tdf-h2h-vs{ padding-top: 0; }
    .tdf-fav-note, .tdf-dutch-outlook{ max-width: none; text-align: left; }
    .tdf-dutch-rider{ flex-direction: column; gap: 4px; }
    .tdf-modal{ max-width: 92%; padding: 18px 16px; }
    .tdf-gc-table td, .tdf-gc-table th{ padding: 8px 6px; }
    .tdf-profile{ height: 44px; }
  }
  @media (max-width: 420px){
    .tdf-hero-stats{ gap: 10px 16px; }
    .tdf-hero-stat-val{ font-size: 15px; }
    .tdf-fav div{ margin: 8px 0; }
  }
</style>


<div class="tdf-wrap" id="app">
  <div class="tdf-sidebar">
    <div class="tdf-brand">
      <div class="tdf-brand-name">Tour de France</div>
      <div class="tdf-brand-sub">4–26 juli 2026 · Barcelona → Parijs</div>
      <div class="tdf-countdown" id="tdf-countdown">Laden...</div>
    </div>
    <div class="tdf-tabs">
      <button class="tdf-tab active" id="tab-etappes" onclick="switchTab('etappes')">Etappes</button>
      <button class="tdf-tab" id="tab-renners" onclick="switchTab('renners')">Renners</button>
    </div>
    <div class="tdf-stage-list" id="stage-list"></div>
  </div>
  <div class="tdf-main" id="main"></div>

let currentStage=null,currentTab='etappes';

function getCountdown(){
  const start=new Date('2026-07-04T14:00:00');
  const now=new Date();
  const diff=start-now;
  if(diff<=0)return'De Tour is begonnen!';
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  return`Start over ${d}d ${h}u`;
}

function getTodayStage(){
  const today=new Date().toISOString().split('T')[0];
  let s=STAGES.find(x=>x.date===today);
  if(!s){const fut=STAGES.filter(x=>x.date>=today&&x.type!=='rest');s=fut[0]||STAGES[0];}
  return s||STAGES[0];
}

function typeLabel(t){return{mountain:'Bergrit',sprint:'Sprintrit',hilly:'Heuvelrit','tt-team':'Ploeg-TT','tt-ind':'Tijdrit'}[t]||t;}
function typePill(t){const m={'mountain':'pill-mountain','sprint':'pill-sprint','hilly':'pill-hilly','tt-team':'pill-tt','tt-ind':'pill-tt'};return m[t]||'pill-hilly';}

function buildSidebar(){
  document.getElementById('tdf-countdown').textContent=getCountdown();
  const list=document.getElementById('stage-list');
  list.innerHTML=STAGES.map(s=>{
    const isRest=s.type==='rest';
    const isActive=currentStage&&currentStage.n===s.n;
    let cls='tdf-stage-item'+(isRest?' rest':'')+(isActive?' active':'')+(s.wow?' wow':'');
    let pill=isRest?`<span class="tdf-pill pill-rest">Rustdag</span>`:`<span class="tdf-pill ${typePill(s.type)}">${typeLabel(s.type)}</span>`;
    if(s.wow)pill+=`<span class="tdf-pill pill-wow">Mis dit niet</span>`;
    return`<div class="${cls}" onclick="selectStage(${s.n})">
      <div class="tdf-stage-num">Etappe ${s.n} · ${s.date.slice(5).replace('-','/')}</div>
      <div class="tdf-stage-dest">${isRest?'Rustdag':s.to}</div>
      ${!isRest?`<div class="tdf-stage-meta">${s.km} km · ${s.hm.toLocaleString()} hm</div>`:''}
      <div style="margin-top:4px">${pill}</div>
    </div>`;
  }).join('');
}

function selectStage(n){currentStage=STAGES.find(s=>s.n===n);buildSidebar();renderMain();}
function switchTab(t){
  currentTab=t;
  ['etappes','renners'].forEach(x=>{document.getElementById('tab-'+x).classList.toggle('active',x===t);});
  renderMain();
}

function seededRand(seed){
  let x=Math.sin(seed)*10000;
  return x-Math.floor(x);
}
function profileSegs(stageObj){
  const type=typeof stageObj==='string'?stageObj:stageObj.type;
  const cols=(stageObj&&stageObj.cols)||[];
  const km=(stageObj&&stageObj.km)||100;
  const totalSegs=24;
  if(!cols.length){
    const base=type==='tt-ind'||type==='tt-team'?10:7;
    return Array(totalSegs).fill(0).map((_,i)=>({c:'#4caf7d',h:base+seededRand(i*3.1+km)*8}));
  }
  const segs=Array(totalSegs).fill(0).map((_,i)=>({c:'#4caf7d',h:6+seededRand(i*1.7+km)*5}));
  cols.forEach((col,ci)=>{
    const center=Math.round(((ci+1)/(cols.length+1))*totalSegs);
    const width=Math.max(2,Math.round((col.km/km)*totalSegs*2.2));
    const pct=col.pct||6;
    const color=pct>=8?'#e05252':pct>=6?'#f0924a':'#4caf7d';
    const peakH=Math.min(96,30+pct*7);
    for(let w=-width;w<=width;w++){
      const idx=center+w;
      if(idx<0||idx>=totalSegs)continue;
      const falloff=1-Math.abs(w)/(width+1);
      const h=6+peakH*falloff;
      if(h>segs[idx].h){segs[idx]={c:color,h};}
    }
  });
  return segs;
}

function scoreClass(s){return{favor:'badge-favor',against:'badge-against',neut:'badge-neut'}[s]||'badge-neut';}

  const dutchHtml=s.dutch&&s.dutch.riders&&s.dutch.riders.length?`
    <div class="tdf-section">

function showCol(stageN,colIdx){
  const s=STAGES.find(x=>x.n===stageN);
  const c=s.cols[colIdx];

  const bg=document.createElement('div');
  bg.id='col-modal-bg';
  bg.className='tdf-modal-bg';
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  bg.innerHTML=`<div class="tdf-modal">
    <button class="tdf-modal-close" onclick="document.getElementById('col-modal-bg').remove()">×</button>
    <div class="tdf-modal-title">${c.name}</div>
    <div class="tdf-modal-cat">Categorie ${c.cat}</div>
    <div class="tdf-modal-row"><span class="tdf-modal-key">Hoogte</span><span class="tdf-modal-val">${c.hm} m</span></div>
    <div class="tdf-modal-row"><span class="tdf-modal-key">Lengte</span><span class="tdf-modal-val">${c.km} km</span></div>
    <div class="tdf-modal-row"><span class="tdf-modal-key">Gemiddeld stijgingspercentage</span><span class="tdf-modal-val">${c.pct}%</span></div>
    <div class="tdf-modal-hist">${c.history}</div>
  </div>`;
  document.getElementById('app').appendChild(bg);
}

document.getElementById('tdf-countdown').textContent=getCountdown();
